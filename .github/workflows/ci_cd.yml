name: SmartFlow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Run pytest test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smartflow
          POSTGRES_USER: smartflow_user
          POSTGRES_PASSWORD: smartflow_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.10
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Java 11
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download JDBC driver
        run: |
          mkdir -p drivers
          wget -q -O drivers/postgresql-42.7.3.jar \
            https://jdbc.postgresql.org/download/postgresql-42.7.3.jar

      - name: Create .env file
        run: |
          cat > .env << EOF
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=smartflow
          DB_USER=smartflow_user
          DB_PASSWORD=smartflow_pass
          EXCHANGE_RATES_API_KEY=${{ secrets.EXCHANGE_RATES_API_KEY }}
          OPENAI_API_KEY=test_key_not_used_in_unit_tests
          ANTHROPIC_API_KEY=test_key_not_used_in_unit_tests
          SPARK_MASTER=local[*]
          JAVA_HOME=$JAVA_HOME
          EOF

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing -x
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v5.4.2
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  dbt-validate:
    name: Validate dbt models
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smartflow
          POSTGRES_USER: smartflow_user
          POSTGRES_PASSWORD: smartflow_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.10
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.10'

      - name: Install dbt
        run: |
          pip install dbt-core==1.9.4 dbt-postgres==1.9.4

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          smartflowDdataPlatform:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: smartflow_user
                password: smartflow_pass
                dbname: smartflow
                schema: gold
                threads: 4
          EOF

      - name: Create schemas
        run: |
          PGPASSWORD=smartflow_pass psql -h localhost -U smartflow_user -d smartflow \
            -c "CREATE SCHEMA IF NOT EXISTS bronze; CREATE SCHEMA IF NOT EXISTS silver; CREATE SCHEMA IF NOT EXISTS gold; CREATE SCHEMA IF NOT EXISTS ml;"

      - name: Validate dbt project compiles
        run: |
          cd dbt && dbt parse && dbt compile

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build pipeline image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: docker/Dockerfile.pipeline
          push: false
          load: true
          tags: smartflow-pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: |
          docker run --rm smartflow-pipeline:latest python -c "import pyspark, pandas, sklearn; print('PySpark:', pyspark.__version__); print('All imports OK')"
